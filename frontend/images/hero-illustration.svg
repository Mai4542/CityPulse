<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="500" height="400" rx="24" fill="url(#skyGrad)" />

  <!-- Grid lines for futuristic feel -->
  <path d="M 0,350 L 500,350 M 0,300 L 500,300 M 0,250 L 500,250 M 0,200 L 500,200 M 0,150 L 500,150" stroke="#334155" stroke-width="1" opacity="0.3"/>
  <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400" stroke="#334155" stroke-width="1" opacity="0.3"/>

  <!-- City Skyline Silhouette (Abstract) -->
  <path d="M 50,350 L 50,220 L 90,220 L 90,350 M 110,350 L 110,180 L 160,180 L 160,350 M 180,350 L 180,260 L 220,260 L 220,350 M 240,350 L 240,150 L 300,150 L 300,350 M 320,350 L 320,200 L 370,200 L 370,350 M 390,350 L 390,240 L 440,240 L 440,350" fill="#1e293b" opacity="0.8"/>
  <path d="M 70,350 L 70,250 L 100,250 L 100,350 M 140,350 L 140,210 L 180,210 L 180,350 M 260,350 L 260,180 L 320,180 L 320,350 M 350,350 L 350,230 L 400,230 L 400,350" fill="#334155" opacity="0.4"/>

  <!-- Ground Plane -->
  <rect x="0" y="350" width="500" height="50" fill="#0f172a" />
  <rect x="0" y="350" width="500" height="4" fill="url(#tealGrad)" />

  <!-- Glowing Connection Lines -->
  <path d="M 135,180 Q 200,80 270,150 T 415,240" fill="none" stroke="url(#tealGrad)" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <path d="M 70,220 Q 200,300 270,150" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.5" stroke-dasharray="5,5"/>

  <!-- Interactive Report Pins -->
  <!-- Pin 1 (Teal - Resolved) -->
  <g transform="translate(135, 180)">
    <circle cx="0" cy="0" r="12" fill="#14b8a6" opacity="0.3" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="6" fill="#14b8a6" />
    <path d="M-4,-2 L-1,1 L4,-4" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Pin 2 (Gold - In Progress) -->
  <g transform="translate(270, 150)">
    <circle cx="0" cy="0" r="16" fill="#f59e0b" opacity="0.3" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="8" fill="#f59e0b" />
    <!-- Clock icon in pin -->
    <circle cx="0" cy="0" r="5" fill="none" stroke="#fff" stroke-width="1.2"/>
    <line x1="0" y1="0" x2="0" y2="-3" stroke="#fff" stroke-width="1.2"/>
    <line x1="0" y1="0" x2="2" y2="0" stroke="#fff" stroke-width="1.2"/>
  </g>

  <!-- Pin 3 (Red - New/Alert) -->
  <g transform="translate(415, 240)">
    <circle cx="0" cy="0" r="12" fill="#ef4444" opacity="0.3" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="6" fill="#ef4444" />
    <circle cx="0" cy="0" r="2" fill="#fff" />
  </g>

  <!-- Dashboard Glassmorphic Card Overlay -->
  <g transform="translate(30, 40)" opacity="0.95">
    <!-- Blur/Background -->
    <rect width="180" height="100" rx="16" fill="#1e293b" fill-opacity="0.7" stroke="#475569" stroke-width="1.5" />
    <!-- Mini chart -->
    <text x="15" y="25" fill="#94a3b8" font-family="sans-serif" font-size="10" font-weight="bold">معدل حل البلاغات</text>
    <text x="15" y="45" fill="#fff" font-family="sans-serif" font-size="20" font-weight="black">٩٤.٢٪</text>
    
    <path d="M 15,80 L 45,75 L 75,85 L 105,65 L 135,55 L 165,50" fill="none" stroke="#14b8a6" stroke-width="3" stroke-linecap="round"/>
    <circle cx="165" cy="50" r="4" fill="#14b8a6" filter="url(#glow)"/>
  </g>

  <g transform="translate(290, 260)" opacity="0.95">
    <rect width="180" height="70" rx="16" fill="#1e293b" fill-opacity="0.7" stroke="#475569" stroke-width="1.5" />
    <text x="15" y="25" fill="#94a3b8" font-family="sans-serif" font-size="10" font-weight="bold">متوسط وقت الاستجابة</text>
    <text x="15" y="48" fill="#f59e0b" font-family="sans-serif" font-size="18" font-weight="black">٢.٤ ساعة</text>
    <!-- Speed pulse icon -->
    <path d="M 140,35 L 155,20 L 160,25 L 145,40 Z" fill="#f59e0b"/>
  </g>

  <!-- User feedback tooltip -->
  <g transform="translate(200, 210)">
    <rect x="-60" y="-30" width="120" height="24" rx="6" fill="#1e293b" stroke="#14b8a6" stroke-width="1"/>
    <polygon points="0,-6 -6,-12 6,-12" fill="#1e293b" transform="rotate(180) translate(0, -25)"/>
    <text x="0" y="-14" fill="#14b8a6" font-family="sans-serif" font-size="9" font-weight="bold" text-anchor="middle">تم حل المشكلة بنجاح! ⭐️</text>
  </g>
</svg>
