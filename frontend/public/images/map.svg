<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" width="100%" height="100%">
  <defs>
    <linearGradient id="mapBgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <filter id="glowTeal" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Card Background -->
  <rect width="400" height="350" rx="16" fill="url(#mapBgGrad)" stroke="#334155" stroke-width="1"/>

  <!-- Simulated Governorate Boundary -->
  <g fill="#1e293b" stroke="#475569" stroke-width="2" stroke-linejoin="round">
    <!-- Center 1: Benha -->
    <path d="M120 40 L200 30 L220 70 L180 90 L130 80 Z" fill="#0f172a" stroke="#14b8a6" stroke-width="1.5" opacity="0.9" style="cursor:pointer; transition: fill 0.3s;" onmouseover="this.setAttribute('fill', '#14b8a6'); this.setAttribute('opacity', '0.2')" onmouseout="this.setAttribute('fill', '#0f172a'); this.setAttribute('opacity', '0.9')"/>
    <!-- Center 2: Qalyub -->
    <path d="M160 170 L210 180 L230 220 L190 240 L140 220 Z" fill="#0f172a" stroke="#14b8a6" stroke-width="1.5" opacity="0.9" style="cursor:pointer; transition: fill 0.3s;"/>
    <!-- Center 3: Shubra El Kheima -->
    <path d="M190 240 L240 230 L260 280 L210 300 L170 270 Z" fill="#0f172a" stroke="#ef4444" stroke-width="1.5" opacity="0.9" style="cursor:pointer; transition: fill 0.3s;"/>
    <!-- Center 4: Al-Khankah -->
    <path d="M220 140 L290 130 L310 180 L270 200 L230 190 Z" fill="#0f172a" stroke="#14b8a6" stroke-width="1.5" opacity="0.9" style="cursor:pointer; transition: fill 0.3s;"/>
    <!-- Center 5: Tokh -->
    <path d="M130 80 L180 90 L210 140 L160 170 L110 130 Z" fill="#0f172a" stroke="#14b8a6" stroke-width="1.5" opacity="0.9" style="cursor:pointer; transition: fill 0.3s;"/>
    <!-- Center 6: Kafr Shukr -->
    <path d="M200 30 L260 20 L280 60 L240 80 L220 70 Z" fill="#0f172a" stroke="#14b8a6" stroke-width="1.5" opacity="0.9" style="cursor:pointer; transition: fill 0.3s;"/>
    <!-- Center 7: Shebeen Al Qanater -->
    <path d="M210 90 L280 80 L290 130 L220 140 L200 110 Z" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5" opacity="0.9" style="cursor:pointer; transition: fill 0.3s;"/>
  </g>

  <!-- Labels -->
  <text x="160" y="60" fill="#94a3b8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">بنها</text>
  <text x="160" y="125" fill="#94a3b8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">طوخ</text>
  <text x="180" y="200" fill="#94a3b8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">قليوب</text>
  <text x="215" y="270" fill="#ef4444" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">شبرا الخيمة</text>
  <text x="265" y="165" fill="#94a3b8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">الخانكة</text>
  <text x="240" y="48" fill="#94a3b8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">كفر شكر</text>
  <text x="245" y="110" fill="#f59e0b" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">شبين القناطر</text>

  <!-- Live Pulse Dots for active complaints -->
  <!-- Active 1 in Shubra (Red) -->
  <circle cx="220" cy="275" r="5" fill="#ef4444"/>
  <circle cx="220" cy="275" r="10" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.6">
    <animate attributeName="r" values="5;15" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Active 2 in Benha (Teal) -->
  <circle cx="160" cy="45" r="4" fill="#14b8a6"/>
  <circle cx="160" cy="45" r="8" fill="none" stroke="#14b8a6" stroke-width="1.5" opacity="0.6">
    <animate attributeName="r" values="4;12" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Active 3 in Shebeen (Amber) -->
  <circle cx="250" cy="115" r="4" fill="#f59e0b"/>
  <circle cx="250" cy="115" r="8" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6">
    <animate attributeName="r" values="4;12" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Map Legend -->
  <g transform="translate(20, 20)">
    <rect width="100" height="60" rx="8" fill="#0f172a" fill-opacity="0.8" stroke="#334155" stroke-width="1"/>
    
    <circle cx="15" cy="15" r="4" fill="#ef4444"/>
    <text x="25" y="18" fill="#cbd5e1" font-family="sans-serif" font-size="8" font-weight="bold">خطر مرتفع</text>
    
    <circle cx="15" cy="30" r="4" fill="#f59e0b"/>
    <text x="25" y="33" fill="#cbd5e1" font-family="sans-serif" font-size="8" font-weight="bold">خطر متوسط</text>
    
    <circle cx="15" cy="45" r="4" fill="#14b8a6"/>
    <text x="25" y="48" fill="#cbd5e1" font-family="sans-serif" font-size="8" font-weight="bold">خطر منخفض</text>
  </g>
</svg>
