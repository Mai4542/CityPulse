<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="url(#avatarGrad)"/>
  
  <!-- Developer Laptop Glow -->
  <path d="M20 90 L80 90 L70 70 L30 70 Z" fill="#60a5fa" opacity="0.3"/>
  
  <!-- Face/Skin -->
  <circle cx="50" cy="45" r="18" fill="#fed7aa"/>
  
  <!-- Hair (Noran) -->
  <path d="M32 45 C32 25 68 25 68 45 C68 49 66 52 64 54 C66 40 34 40 36 54 C34 52 32 49 32 45 Z" fill="url(#hairGrad)"/>
  <path d="M32 40 L30 55 L36 50 Z" fill="url(#hairGrad)"/>
  <path d="M68 40 L70 55 L64 50 Z" fill="url(#hairGrad)"/>

  <!-- Eyes -->
  <circle cx="44" cy="45" r="2" fill="#0f172a"/>
  <circle cx="56" cy="45" r="2" fill="#0f172a"/>
  
  <!-- Smile -->
  <path d="M47 51 Q50 54 53 51" fill="none" stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>

  <!-- Glasses -->
  <rect x="38" y="41" width="10" height="7" rx="2" fill="none" stroke="#475569" stroke-width="1.5"/>
  <rect x="52" y="41" width="10" height="7" rx="2" fill="none" stroke="#475569" stroke-width="1.5"/>
  <line x1="48" y1="44" x2="52" y2="44" stroke="#475569" stroke-width="1.5"/>

  <!-- Clothes -->
  <path d="M25 85 C25 70 35 65 50 65 C65 65 75 70 75 85 Z" fill="#0f172a"/>
  <!-- Collar -->
  <path d="M42 65 L50 72 L58 65 Z" fill="#fed7aa"/>
  
  <!-- Glasses/Code overlay -->
  <text x="50" y="82" fill="#34d399" font-family="monospace" font-size="7" font-weight="bold" text-anchor="middle">&lt;code/&gt;</text>
</svg>
